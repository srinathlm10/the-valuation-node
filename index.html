<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Srinath Gajji" />

  <!-- Apply the saved (or system) theme before first paint to avoid a flash.
       Uses the same "theme" localStorage key as next-themes. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        var dark = t === "dark" || ((!t || t === "system") && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
      } catch (e) { }
    })();
  </script>
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fbfaf7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#10161e" />

  <!-- Typography: Inter (UI) + Source Serif 4 (article body). Open-license Google Fonts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
    rel="stylesheet" />

  <!-- Page-specific SEO (title, description, canonical, Open Graph, Twitter) is
       set per-route via react-helmet-async and baked into each prerendered page.
       Only site-wide, non-page-specific tags live here. -->

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="/favicon-logo.png" sizes="64x64" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- Structured data: WebSite + Person -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://valuationnode.com/#website",
        "name": "The Valuation Node",
        "url": "https://valuationnode.com",
        "description": "Original valuation and credit analysis of Indian companies, plus a free learning library.",
        "inLanguage": "en-IN",
        "author": { "@id": "https://valuationnode.com/#person" },
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://valuationnode.com/learn/glossary?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@type": "Person",
        "@id": "https://valuationnode.com/#person",
        "name": "Srinath Gajji",
        "jobTitle": "Founder and Editor",
        "worksFor": { "@id": "https://valuationnode.com/#website" },
        "email": "srinath@valuationnode.com",
        "sameAs": ["https://www.linkedin.com/in/gajji-srinath/"],
        "url": "https://valuationnode.com/about/author"
      }
    ]
  }
  </script>

  <!-- Umami Analytics -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="2d7ca407-2491-4901-9401-a45805f4f2cd"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
