[build]
  command = "npm run build"
  publish = "dist"

# ── Security headers (all pages) ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Immutable cache for hashed Vite build assets ───────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Short cache for root-level static files (logo, robots, sitemap) ────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=utf-8"

# ── Legacy paths: real 301 redirects for SEO (must precede the fallback) ───
[[redirects]]
  from = "/calculators"
  to = "/tools"
  status = 301

[[redirects]]
  from = "/stocks"
  to = "/markets/nifty50"
  status = 301

[[redirects]]
  from = "/compliance"
  to = "/markets/compliance"
  status = 301

[[redirects]]
  from = "/learn/wiki"
  to = "/learn/glossary"
  status = 301

[[redirects]]
  from = "/learn/basics"
  to = "/learn/foundations"
  status = 301

[[redirects]]
  from = "/learn/fundamental-analysis"
  to = "/learn/foundations/valuation"
  status = 301

[[redirects]]
  from = "/learn/technical-analysis"
  to = "/learn/foundations/markets-and-instruments/technical-analysis-primer"
  status = 301

# ── SPA fallback (handled by _redirects; kept here as failsafe) ────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
